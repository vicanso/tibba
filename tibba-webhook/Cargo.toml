[package]
name = "tibba-webhook"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
keywords = ["tibba", "webhook"]
description = "Outbound webhook delivery (HMAC-signed, queue-backed retry/dead-letter) for tibba"

[lib]
name = "tibba_webhook"
path = "src/lib.rs"

[dependencies]
http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
sqlx = { workspace = true }
tracing = { workspace = true }
tibba-crypto = { path = "../tibba-crypto", version = "0.2.5" }
tibba-error = { path = "../tibba-error", version = "0.2.5" }
tibba-job = { path = "../tibba-job", version = "0.2.5" }
tibba-request = { path = "../tibba-request", version = "0.2.5" }
tibba-util = { path = "../tibba-util", version = "0.2.5" }

[dev-dependencies]
pretty_assertions = { workspace = true }
