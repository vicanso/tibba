[package]
name = "tibba-totp"
version = "0.2.2"
edition = "2024"
authors = ["Tree Xie <tree.xie@outlook.com>"]
license = "Apache-2.0"
homepage = "https://github.com/vicanso/tibba"
repository = "https://github.com/vicanso/tibba"
keywords = ["tibba", "totp", "2fa", "mfa"]
description = "RFC 6238 TOTP core and secret-at-rest encryption for tibba"

[lib]
name = "tibba_totp"
path = "src/lib.rs"

[dependencies]
aes-gcm = { workspace = true }
base64 = { workspace = true }
hmac = { workspace = true }
rand = { workspace = true }
sha1 = { workspace = true }
sha2 = { workspace = true }
snafu = { workspace = true }
subtle = { workspace = true }
tibba-error = { path = "../tibba-error", version = "0.2.2" }
