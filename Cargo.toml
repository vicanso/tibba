[package]
name = "tibba"
version = "0.1.0"
edition = "2021"
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
async-trait = "0.1.74"
axum = "0.7.1"
axum-client-ip = "0.5.0"
axum-extra = { version = "0.9.0", features = ["cookie"] }
base64 = "0.21.5"
bytes = "1.5.0"
chrono = "0.4.31"
config = { version = "0.13.4", features = ["yaml"] }
cookie = "0.18.0"
deadpool-redis = "0.13.0"
hex = "0.4.3"
http-body-util = "0.1.0"
humantime = "2.1.0"
hyper = "1.0.1"
jsonwebtoken = "9.1.0"
lru = "0.12.1"
lz4_flex = "0.11.1"
mime_guess = "2.0.4"
nanoid = "0.4.0"
once_cell = "1.18.0"
os_info = "3.7.0"
redis = { version = "0.23.3", features = ["tokio-comp", "aio"] }
regex = "1.10.2"
reqwest = { version = "0.11.22", default-features = false, features = ["rustls-tls", "json"] }
rust-embed = { version = "8.0.0", features = ["mime-guess"] }
sea-orm = { version = "0.12.7", features = ["sqlx-mysql", "runtime-tokio-rustls", "macros"] }
serde = { version = "1.0.193", features = ["derive"] }
serde_json = "1.0.108"
serde_path_to_error = "0.1.14"
serde_urlencoded = "0.7.1"
sha2 = "0.10.8"
snafu = "0.7.5"
substring = "1.4.5"
time = "0.3.30"
tokio = { version = "1.34.0", features = ["macros", "rt", "rt-multi-thread", "net", "signal"] }
tower = { version = "0.4.13", features = ["timeout"] }
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["local-time"] }
url = "2.5.0"
urlencoding = "2.1.3"
uuid = { version = "1.6.1", features = ["v4", "fast-rng", "macro-diagnostics"] }
validator = { version = "0.16.1", features = ["derive"] }
x509-parser = "0.15.1"
zstd = "0.13.0"

[dev-dependencies]
pretty_assertions = "1.4.0"

[profile.release]
codegen-units = 1
lto = true
