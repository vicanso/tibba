[package]
name = "tibba"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
async-redis-session = "0.2.2"
async-trait = "0.1.66"
axum = "0.6.10"
axum-client-ip = "0.4.0"
axum-extra = { version = "0.6.0", features = ["cookie"] }
axum-sessions = "0.4.1"
chrono = "0.4.23"
config = { version = "0.13.3", features = ["yaml"] }
cookie = "0.17.0"
deadpool-redis = "0.11.1"
http = "0.2.9"
humantime = "2.1.0"
hyper = "0.14.24"
lru = "0.10.0"
nanoid = "0.4.0"
once_cell = "1.17.1"
os_info = "3.6.0"
# TODO 是否可更新为0.22.3
redis = { version = "0.20.2", features = ["tokio-comp", "aio"] }
rust-embed = "6.6.0"
serde = { version = "1.0.152", features = ["derive"] }
serde_json = "1.0.93"
snafu = "0.7.4"
snap = "1.1.0"
tempfile = "3.4.0"
tokio = { version = "1.26.0", features = ["macros", "rt", "rt-multi-thread", "net", "signal"] }
tower = { version = "0.4.13", features = ["timeout"]}
tracing = "0.1.37"
tracing-subscriber = "0.3.16"
url = "2.3.1"
urlencoding = "2.1.2"
validator = { version = "0.16.0", features = ["derive"] }
zstd = "0.12.3"
