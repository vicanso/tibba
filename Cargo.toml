[package]
name = "tibba"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
async-redis-session = "0.2.2"
async-trait = "0.1.62"
axum = "0.6.1"
axum-client-ip = "0.3.0"
axum-extra = "0.4.2"
axum-sessions = "0.4.1"
chrono = "0.4.23"
config = { version = "0.13.3", features = ["yaml"] }
cookie = "0.16.2"
deadpool-redis = "0.11.1"
http = "0.2.8"
humantime = "2.1.0"
hyper = "0.14.23"
lru = "0.9.0"
nanoid = "0.4.0"
once_cell = "1.17.0"
os_info = "3.5.1"
redis = { version = "0.20.2", features = ["tokio-comp"] }
rust-embed = "6.4.2"
serde = { version = "1.0.148", features = ["derive"] }
serde_json = "1.0.91"
snafu = "0.7.4"
snap = "1.1.0"
tempfile = "3.3.0"
tokio = { version = "1.22.0", features = ["macros", "rt", "rt-multi-thread", "net", "signal"] }
tower = { version = "0.4.13", features = ["timeout"]}
tracing = "0.1.37"
tracing-subscriber = "0.3.16"
url = "2.3.1"
urlencoding = "2.1.2"
validator = { version = "0.16.0", features = ["derive"] }
zstd = "0.12.2"
