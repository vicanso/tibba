[package]
name = "tibba"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
async-session = "3.0.0"
async-trait = "0.1.68"
axum = "0.6.18"
axum-client-ip = "0.4.1"
axum-extra = { version = "0.7.4", features = ["cookie"] }
axum-sessions = "0.5.0"
chrono = "0.4.26"
config = { version = "0.13.3", features = ["yaml"] }
cookie = "0.17.0"
deadpool-redis = "0.12.0"
hex = "0.4.3"
humantime = "2.1.0"
hyper = "0.14.26"
lru = "0.10.0"
mime_guess = "2.0.4"
nanoid = "0.4.0"
once_cell = "1.18.0"
os_info = "3.7.0"
redis = { version = "0.23.0", features = ["tokio-comp", "aio"] }
reqwest = { version = "0.11.18", default-features = false, features = ["rustls-tls", "json"] }
rust-embed = { version = "6.7.0", features = ["mime-guess"] }
serde = { version = "1.0.164", features = ["derive"] }
serde_json = "1.0.96"
snafu = "0.7.4"
snap = "1.1.0"
substring = "1.4.5"
tempfile = "3.6.0"
time = "0.3.22"
tokio = { version = "1.28.2", features = ["macros", "rt", "rt-multi-thread", "net", "signal"] }
tower = { version = "0.4.13", features = ["timeout"]}
tracing = "0.1.37"
tracing-subscriber = { version = "0.3.17", features = ["local-time"] }
url = "2.3.1"
urlencoding = "2.1.2"
validator = { version = "0.16.0", features = ["derive"] }
zstd = "0.12.3"
