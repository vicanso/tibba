[package]
name = "tibba"
version = "0.1.0"
edition = "2021"
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
async-trait = "0.1.74"
axum = { version = "0.6.20", features = ["headers"] }
axum-client-ip = "0.4.2"
axum-extra = { version = "0.8.0", features = ["cookie"] }
base64 = "0.21.5"
bytes = "1.5.0"
chrono = "0.4.31"
config = { version = "0.13.3", features = ["yaml"] }
cookie = "0.17.0"
deadpool-redis = "0.12.0"
hex = "0.4.3"
humantime = "2.1.0"
hyper = "0.14.27"
jsonwebtoken = "8.3.0"
lru = "0.11.0"
lz4_flex = "0.11.1"
mime_guess = "2.0.4"
nanoid = "0.4.0"
once_cell = "1.18.0"
os_info = "3.7.0"
redis = { version = "0.23.3", features = ["tokio-comp", "aio"] }
regex = "1.10.2"
reqwest = { version = "0.11.22", default-features = false, features = ["rustls-tls", "json"] }
rust-embed = { version = "6.8.1", features = ["mime-guess"] }
sea-orm = { version = "0.12.4", features = ["sqlx-mysql", "runtime-tokio-rustls"] }
serde = { version = "1.0.190", features = ["derive"] }
serde_json = "1.0.108"
serde_path_to_error = "0.1.14"
serde_urlencoded = "0.7.1"
sha2 = "0.10.8"
snafu = "0.7.5"
substring = "1.4.5"
time = "0.3.30"
tokio = { version = "1.33.0", features = ["macros", "rt", "rt-multi-thread", "net", "signal"] }
tower = { version = "0.4.13", features = ["timeout"] }
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.17", features = ["local-time"] }
url = "2.4.1"
urlencoding = "2.1.3"
uuid = { version = "1.5.0", features = ["v4", "fast-rng", "macro-diagnostics"] }
validator = { version = "0.16.1", features = ["derive"] }
x509-parser = "0.15.1"
zstd = "0.12.4"

[dev-dependencies]
pretty_assertions = "1.4.0"
