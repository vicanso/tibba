# basic config
[basic]
# timeout for http request
timeout = "60s"
listen = "127.0.0.1:5000"
processing_limit = 1_000
secret = "osbhdlycJ0"


# session config
[session]
# session cookie name
cookie = "tibba_web"
# session ttl
ttl = "7d"

[opendal]
url = "file://~/Downloads"

[diving]
url = "http://127.0.0.1:7002"
# Resend 发件人（需在 Resend 控制台验证发件域；测试可用 onboarding@resend.dev）
email_from = "onboarding@resend.dev"
# resend_api_key 推荐通过环境变量 TIBBA_WEB__DIVING__RESEND_API_KEY 注入，避免提交进仓库

[token]
# token_llm / token_price 的 `model` 字段下拉选项
models = ["mimo-v2.5-pro"]
