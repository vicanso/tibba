# basic config
[basic]
# timeout for http request
timeout = "60s"
listen = "127.0.0.1:5000"
processing_limit = 1_000
secret = "osbhdlycJ0"


# session config
[session]
# session cookie name
cookie = "tibba_web"
# session ttl
ttl = "7d"

[opendal]
url = "file://~/Downloads"

[diving]
url = "http://127.0.0.1:7002"

# 邮件发送配置（被 docker_analysis 通知 / 邮箱验证 / 密码重置等所有发送方共用）
# 整段可缺省——只在真正发邮件时报错，开发期不强制
[email]
# 发件人地址，需在 Resend 控制台验证发件域
# 沙盒模式可用 onboarding@resend.dev（收件人须为 Resend 账号绑定邮箱）
from = "onboarding@resend.dev"
# api_key 推荐通过环境变量 TIBBA_WEB__EMAIL__API_KEY 注入，避免提交进仓库
# 可选 Reply-To：
# reply_to = "support@example.com"

# 第三方 OAuth provider 配置（可选；整段缺失 / 字段缺失不影响应用启动）
# 配置完整后 GET /api/users/oauth/github/start 即可走 GitHub 登录流程
[oauth.github]
# client_id 和 client_secret 在 GitHub Settings → Developer settings → OAuth Apps 创建
# client_secret 推荐通过环境变量 TIBBA_WEB__OAUTH__GITHUB__CLIENT_SECRET 注入
client_id = ""
# redirect_uri 必须与 GitHub OAuth App 后台「Authorization callback URL」完全一致
redirect_uri = "http://localhost:5000/api/users/oauth/github/callback"

[oauth.google]
# Google Cloud Console → APIs & Services → Credentials → OAuth 2.0 Client IDs（Web App 类型）
# client_secret 推荐通过环境变量 TIBBA_WEB__OAUTH__GOOGLE__CLIENT_SECRET 注入
client_id = ""
# redirect_uri 必须在 Google Cloud Console 客户端的「Authorized redirect URIs」列表内
redirect_uri = "http://localhost:5000/api/users/oauth/google/callback"

[token]
# token_llm / token_price 的 `model` 字段下拉选项
models = ["mimo-v2.5-pro"]

# JWT 备选鉴权（HS256）。与现有 Session+Cookie 路径正交。
# secret 留空或整段缺失时，/login/jwt 等端点统一 503，应用照常启动。
[jwt]
# HS256 共享密钥，**绝不入仓**。强烈推荐通过环境变量
#   TIBBA_WEB__JWT__SECRET
# 注入；本字段留空作占位。
secret = ""
# access token TTL（humantime）；签发的 JWT 过期时间
access_ttl = "15m"
# refresh token（opaque UUID，存 Redis）TTL
refresh_ttl = "7d"
# 写进 access JWT 的 `iss` claim，多服务区分用
issuer = "tibba"

# OTLP 分布式追踪导出。
# 配置走 **OTel SDK 标准环境变量**（避免 init_logger 和 config 加载的时序耦合）：
#   OTEL_EXPORTER_OTLP_ENDPOINT   collector 地址，如 http://otel-collector:4318
#                                 未设置或空 → telemetry 完全关闭，0 网络开销
#   OTEL_SERVICE_NAME             资源 service.name 标签；缺省 "tibba"
# 用 HTTP/Protobuf 传输（最通用）。Jaeger / Tempo / Grafana Agent / Datadog 通用。
